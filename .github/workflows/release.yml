name: release
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release'
        required: false
        default: nightly
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            file_extension: .exe
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v7

      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          target: ${{ matrix.target }}

      - name: Cache rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            **/target/
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu'}}
        run: sudo apt-get update && sudo apt-get install g++ pkg-config libx11-dev libudev-dev libxkbcommon-x11-0

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename Artifact
        run: cp ./target/${{ matrix.target }}/release/fmc_173${{ matrix.file_extension }} ${{ matrix.target }}${{ matrix.file_extension }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.target }}${{ matrix.file_extension }}
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - run: mkdir artifacts

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - if: github.event_name == 'workflow_dispatch'
        env:
          TAG_NAME: ${{ github.event.inputs.tag_name }}
        run: echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV

      - if: github.event_name == 'push'
        run: |
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create new release
        run: |
          gh release delete $TAG_NAME --yes --cleanup-tag || true
          gh release create $TAG_NAME --latest ./artifacts/*/*

